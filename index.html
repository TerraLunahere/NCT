function getTestResult(avgScores) {
  const neoLetter = avgScores.neoFlavor >= 5 ? "N" : "n";
  const energyLetter = avgScores.energy >= 5 ? "I" : "R";
  const exprLetter = avgScores.expression >= 5 ? "F" : "S";
  const densityLetter = avgScores.density >= 5 ? "G" : "M";
  
  const code = neoLetter + energyLetter + exprLetter + densityLetter;
  const matched = resultMap[code] || resultMap["NRSM"];
  
  return {
    code: code,
    unit: matched.unit,
    song: matched.song,
    description: matched.desc,
    rawScores: avgScores
  };
}

function getOppositeResult(code) {
  let opposite = '';
  for (let c of code) {
    switch(c) {
      case 'N': opposite += 'n'; break;
      case 'n': opposite += 'N'; break;
      case 'I': opposite += 'R'; break;
      case 'R': opposite += 'I'; break;
      case 'F': opposite += 'S'; break;
      case 'S': opposite += 'F'; break;
      case 'G': opposite += 'M'; break;
      case 'M': opposite += 'G'; break;
      default: opposite += c;
    }
  }
  return {
    code: opposite,
    ...(resultMap[opposite] || resultMap["nIFG"])
  };
}

function calculateCredibility(answers) {
  const validAnswers = answers.filter(a => a.neo != null);
  const n = validAnswers.length;
  if (n === 0) return 0;

  function std(arr) {
    const mean = arr.reduce((a,b)=>a+b,0)/arr.length;
    const varSum = arr.reduce((a,b)=>a+(b-mean)**2,0);
    return Math.sqrt(varSum/arr.length);
  }

  const neoScores = validAnswers.map(a => a.neo);
  const energyScores = validAnswers.map(a => a.energy);
  const exprScores = validAnswers.map(a => a.expression);
  const densityScores = validAnswers.map(a => a.density);

  const sNeo = std(neoScores);
  const sE = std(energyScores);
  const sX = std(exprScores);
  const sD = std(densityScores);
  const avgStd = (sNeo + sE + sX + sD) / 4;

  let score1 = 0;
  if (avgStd <= 1.0) score1 = 35;
  else if (avgStd <= 2.0) score1 = 28;
  else if (avgStd <= 3.0) score1 = 21;
  else if (avgStd <= 4.0) score1 = 14;
  else score1 = 0;

  const totalPerQuestion = validAnswers.map(a => a.neo + a.energy + a.expression + a.density);
  const stdTotal = std(totalPerQuestion);
  let score2_2 = 0;
  if (stdTotal <= 3) score2_2 = 20;
  else if (stdTotal <=5) score2_2 =12;
  else score2_2 =0;

  const optionLetters = validAnswers.map((a,i) => {
    const q = questionMap[a.questionId];
    const idx = q.options.findIndex(o=>o.id === a.optionId);
    return ['A','B','C','D'][idx] || 'A';
  });

  const freq = {};
  optionLetters.forEach(c => freq[c] = (freq[c]||0)+1);
  const counts = Object.values(freq).sort((a,b)=>b-a);
  let score2_1 = 0;
  if (counts.length ===1) score2_1 =0;
  else if (counts.length <=2) score2_1 =7;
  else score2_1 =15;

  let score2 = Math.min(score2_1 + score2_2, 35);

  const sumN = neoScores.reduce((a,b)=>a+b,0);
  const sumE = energyScores.reduce((a,b)=>a+b,0);
  const sumX = exprScores.reduce((a,b)=>a+b,0);
  const sumD = densityScores.reduce((a,b)=>a+b,0);

  const maxN = n*10;
  const maxE = n*10;
  const maxX = n*10;
  const maxD = n*10;

  function isExtreme(sum, max) {
    return sum >= max*0.9 || sum <= max*0.1;
  }

  const extCount = [isExtreme(sumN,maxN), isExtreme(sumE,maxE), isExtreme(sumX,maxX), isExtreme(sumD,maxD)].filter(Boolean).length;
  let score3 =0;
  if (extCount ===0) score3=30;
  else if (extCount ===1) score3=18;
  else if (extCount ===2) score3=9;
  else score3=0;

  const total = Math.round(score1 + score2 + score3);
  return Math.max(0, Math.min(100, total));
}

function dimBar(labelLeft, labelRight, percent) {
  return `
  <div class="dim-item">
    <div class="dim-label">
      <span>${labelLeft}</span>
      <span>${labelRight}</span>
    </div>
    <div class="dim-progress">
      <div class="dim-fill" style="width:${percent}%"></div>
    </div>
  </div>`;
}

let currentQuestionIndex = 0;
let userAnswers = [];
let totalQuestions = 0;
let questionOrder = [];
let mainResult = null;

function init() {
  questionOrder = buildQuestionOrder();
  totalQuestions = questionOrder.length;
  currentQuestionIndex = 0;
  userAnswers = [];
  const nextBtn = document.getElementById('nextBtn');
  if (nextBtn) nextBtn.style.display = 'block';
  renderQuestion();
}

function buildQuestionOrder() {
  const order = [];
  const mainIds = [
    "song_q1","song_q2","song_q3","song_q4","song_q5","song_q6",
    "scene_main","mood_main","explore_main","state_main"
  ];
  mainIds.forEach(id => {
    const q = questionMap[id];
    if (q) order.push(q.id);
  });
  return order;
}

function getQuestionById(id) {
  return questionMap[id];
}

function renderQuestion() {
  const area = document.getElementById('questionsArea');
  const qid = questionOrder[currentQuestionIndex];
  const q = getQuestionById(qid);
  if (!q) { nextQuestion(); return; }

  let html = `<div class="question-card">
    <div class="question-text">${q.text}</div>
    <div class="options">`;
  q.options.forEach((opt, i) => {
    html += `<div class="option" data-opt-index="${i}" onclick="selectOption(this)">${opt.text}</div>`;
  });
  html += `</div></div>`;
  area.innerHTML = html;

  const prog = document.getElementById('progressFill');
  prog.style.width = ((currentQuestionIndex / totalQuestions) * 100) + '%';
}

function selectOption(el) {
  document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
  el.classList.add('selected');
}

function nextQuestion() {
  const sel = document.querySelector('.option.selected');
  if (!sel) { alert("请选择一个选项"); return; }

  const qid = questionOrder[currentQuestionIndex];
  const q = getQuestionById(qid);
  const idx = parseInt(sel.dataset.optIndex);
  const opt = q.options[idx];

  userAnswers.push({
    questionId: qid,
    optionId: opt.id,
    neo: opt.neo || 0,
    energy: opt.energy || 0,
    expression: opt.expression || 0,
    density: opt.density || 0
  });

  if (opt.next) {
    questionOrder.splice(currentQuestionIndex + 1, 0, opt.next);
    totalQuestions = questionOrder.length;
  }

  currentQuestionIndex++;
  if (currentQuestionIndex >= questionOrder.length) {
    const nextBtn = document.getElementById('nextBtn');
    if (nextBtn) nextBtn.style.display = 'none';
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  document.getElementById('questionsArea').style.display = 'none';
  const resArea = document.getElementById('resultArea');
  resArea.style.display = 'block';

  let sumNeo = 0, sumEnergy = 0, sumExpr = 0, sumDensity = 0;
  userAnswers.forEach(a => {
    sumNeo += a.neo;
    sumEnergy += a.energy;
    sumExpr += a.expression;
    sumDensity += a.density;
  });
  const n = userAnswers.length || 1;
  const avg = {
    neoFlavor: sumNeo / n,
    energy: sumEnergy / n,
    expression: sumExpr / n,
    density: sumDensity / n
  };

  mainResult = getTestResult(avg);
  const cr = calculateCredibility(userAnswers);

  const neoPct = (avg.neoFlavor / 10) * 100;
  const energyPct = (avg.energy / 10) * 100;
  const exprPct = (avg.expression / 10) * 100;
  const densityPct = (avg.density / 10) * 100;

  const dimBars = `
  <div class="dim-bar-group">
    ${dimBar(" ", "NEO划味", neoPct)}
    ${dimBar("清爽R", "I强烈", energyPct)}
    ${dimBar("感性S", "F力量", exprPct)}
    ${dimBar("简约M", "G华丽", densityPct)}
  </div>`;

  const crBar = `
<div class="cr-box">
  <div class="cr-text">结果可信度：${cr}%</div>
  <div class="dim-progress">
    <div class="dim-fill" style="width:${cr}%; background:#3c8a29"></div>
  </div>
  <div class="cr-note">以上由西珍妮作答过程计算得</div>
</div>`;

  resArea.innerHTML = `
    <div class="result-area">
      <h2>你的划曲风格结果</h2>
      <div class="result-code">${mainResult.code}</div>
      <p class="result-desc"><strong>${mainResult.unit}</strong> · ${mainResult.song}</p>
      <p class="result-desc">${mainResult.description}</p>
      <hr>
      ${dimBars}
      ${crBar}
      <p style="margin-top:12px; font-size:1rem; color:#3c8a29; font-weight:bold;">
        可以尝试听听风格差异大的划曲～
      </p>
    </div>
    <div class="btn-group">
      <button onclick="showOppositeResult()">反差最大风格</button>
      <button onclick="restartTest()">重新测试</button>
    </div>
  `;
}

function showOppositeResult() {
  if (!mainResult) return;
  const resArea = document.getElementById('resultArea');
  const oppo = getOppositeResult(mainResult.code);

  resArea.innerHTML = `
    <div class="result-area">
      <h2>反差最大的划曲风格</h2>
      <div class="result-code">${oppo.code}</div>
      <p class="result-desc"><strong>${oppo.unit}</strong> · ${oppo.song}</p>
      <p class="result-desc">${oppo.desc}</p>
    </div>
    <div class="btn-group">
      <button onclick="showResult()">查看原结果</button>
      <button onclick="restartTest()">重新测试</button>
    </div>
  `;
}

window.onload = function() {
  const app = document.getElementById('app');
  const btn = document.createElement('button');
  btn.id = 'nextBtn';
  btn.textContent = '下一题';
  btn.onclick = nextQuestion;
  app.appendChild(btn);
};
