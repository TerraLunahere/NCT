function shareTest() {
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({
      title: 'NCT 划曲风格倾向测试',
      text: '测测你的划曲风格代码！',
      url: url

      console.error('分享失败', err);

  } else {
    navigator.clipboard.writeText(url).then(() => {
      alert('链接已复制，快去分享给朋友吧~');
    }).catch(() => {
      alert('无法自动复制，请手动复制链接：' + url);
    });
  }
}

function showTest() {
  document.getElementById('cover').style.display = 'none';

function getCodeFromAvg(avg) {
  const neo = avg.neoFlavor >= 4.46 ? "N" : "n";
  const eng = avg.energy >= 4.46 ? "I" : "R";
  const exp = avg.expression >= 4.46 ? "F" : "S";
  const den = avg.density >= 4.46 ? "G" : "M";
  return neo + eng + exp + den;
}

function getTypeTeam(code) {
  const map = {
    "NRSM":"NCT U","NRSG":"NCT U","NRFM":"NCT 127","NRFG":"NCT 127",
    "NISM":"NCT U","NISG":"WayV","NIFM":"NCT 127","NIFG":"WayV",
    "nRSM":"NCT WISH","nRSG":"NCT WISH","nRFM":"NCT WISH","nRFG":"NCT 127",
    "nISM":"NCT DREAM","nISG":"WayV","nIFM":"NCT DREAM","nIFG":"NCT 127"
  };
  return map[code] || "NCT U";
}

function getFinalTeam(typeTeam, teamProb) {
  if (!teamProb) return typeTeam;
  const teams = ["127","dream","wayv","u","wish"];
  const nameMap = {"127":"NCT 127","dream":"NCT DREAM","wayv":"WayV","u":"NCT U","wish":"NCT WISH"};
  let typeKey = null;
  for (let [k,v] of Object.entries(nameMap)) if (v === typeTeam) { typeKey = k; break; }
  if (!typeKey) typeKey = "u";
  let bestKey = typeKey, bestScore = -1;
  for (let t of teams) {
    let score = (t === typeKey ? 0.75 : 0) + (teamProb[t] || 0) * 0.25;
    if (score > bestScore) { bestScore = score; bestKey = t; }
  }
  return nameMap[bestKey];
}

function getBestSongInTeam(teamKey, avg, selectedNames, rainChoice) {
  let candidates = songLibrary.filter(s => s.team === teamKey);
  if (candidates.length === 0) candidates = songLibrary;
  let best = null, bestDist = Infinity;
  for (let s of candidates) {
    let dist = Math.abs(s.neo - avg.neoFlavor) * 2 + Math.abs(s.energy - avg.energy) * 2 + Math.abs(s.expression - avg.expression) * 1 + Math.abs(s.density - avg.density) * 1;
    if (selectedNames.some(n => s.name.includes(n) || n.includes(s.name.split('(')[0].trim()))) dist *= 0.9;
    if (rainChoice === 'A' && (s.energy <= 3 || s.energy >= 7)) {
      if (s.energy <= 3) dist *= 0.9;
      else if (s.energy >= 7) dist *= 1.1;
    }
    if (rainChoice === 'D' && (s.energy >= 7 || s.energy <= 3)) {
      if (s.energy >= 7) dist *= 0.8;
      else if (s.energy <= 3) dist *= 1.2;
    }
    if (dist < bestDist) { bestDist = dist; best = s; }
  }
  return best;
}

function getFarthestSong(avg) {
  let farthest = null, maxDist = -1;
  for (let s of songLibrary) {
    let dist = Math.abs(s.neo - avg.neoFlavor) * 2 + Math.abs(s.energy - avg.energy) * 2 + Math.abs(s.expression - avg.expression) + Math.abs(s.density - avg.density);
    if (dist > maxDist) { maxDist = dist; farthest = s; }
  }
  return farthest;
}

function calculateCredibility(answers) {
  const valid = answers.filter(a => a.neo != null);
  const n = valid.length;
  if (n === 0) return 0;
  function std(arr) {
    const mean = arr.reduce((a,b)=>a+b,0)/arr.length;
    return Math.sqrt(arr.reduce((a,b)=>a+(b-mean)**2,0)/arr.length);
  }
  const ns = valid.map(a=>a.neo), es = valid.map(a=>a.energy), xs = valid.map(a=>a.expression), ds = valid.map(a=>a.density);
  const sNeo = std(ns), sE = std(es), sX = std(xs), sD = std(ds);
  const avgStd = (sNeo + sE + sX + sD) / 4;
  let score1 = avgStd <= 1 ? 35 : avgStd <= 2 ? 28 : avgStd <= 3 ? 21 : avgStd <= 4 ? 14 : 0;
  const tp = valid.map(a=>a.neo+a.energy+a.expression+a.density);
  const stdTotal = std(tp);
  let score2_2 = stdTotal <= 3 ? 20 : stdTotal <= 5 ? 12 : 0;
  const optionLetters = valid.map(a => {
    for (let q of [mainQuestions, similarBranches, teamBranch, textQuestions]) {
      for (let k in q) {
        if (q[k].options && q[k].options.some(o => o.text === a.optionText || (o.id && o.id === a.optionId))) {
          const idx = q[k].options.findIndex(o => o.text === a.optionText || o.id === a.optionId);
          return ['A','B','C','D'][idx] || 'A';
        }
      }
    }
    return 'A';
  });
  const freq = {};
  optionLetters.forEach(c => freq[c] = (freq[c]||0)+1);
  const counts = Object.values(freq).sort((a,b)=>b-a);
  let score2_1 = counts.length === 1 ? 0 : counts.length <= 2 ? 7 : 15;
  let score2 = Math.min(score2_1 + score2_2, 35);
  const sumN = ns.reduce((a,b)=>a+b,0), sumE = es.reduce((a,b)=>a+b,0), sumX = xs.reduce((a,b)=>a+b,0), sumD = ds.reduce((a,b)=>a+b,0);
  const maxN = n*10, maxE = n*10, maxX = n*10, maxD = n*10;
  const ext = (s,m) => s >= m*0.9 || s <= m*0.1;
  const ec = [ext(sumN,maxN), ext(sumE,maxE), ext(sumX,maxX), ext(sumD,maxD)].filter(Boolean).length;
  let score3 = ec === 0 ? 30 : ec === 1 ? 18 : ec === 2 ? 9 : 0;
  return Math.min(100, Math.max(0, Math.round(score1 + score2 + score3)));
}

}

function generatePoem(avg, selectedMoments, code) {
  const neoVal = avg.neoFlavor;
  const energyVal = avg.energy;
  const exprVal = avg.expression;
  const densityVal = avg.density;
  const neoDesc = neoVal >= 7 ? "黎明前未命名的色彩" : (neoVal >= 4 ? "雨后初晴的湿润空气" : "老唱片里的沙沙声");
  const energyDesc = energyVal >= 7 ? "暴雨砸在铁皮屋顶" : (energyVal >= 4 ? "春日的风时缓时急" : "蒲公英轻轻飘散");
  const exprDesc = exprVal >= 7 ? "举重时肌肉的颤抖" : (exprVal >= 4 ? "篝火旁分享的故事" : "旧照片的泛黄边角");
  const densityDesc = densityVal >= 7 ? "星云的漩涡" : (densityVal >= 4 ? "刺绣上的碎花" : "水墨画的留白");
  let momentText = "";
  if (selectedMoments.length > 0) {
    const randomMoment = selectedMoments[Math.floor(Math.random() * selectedMoments.length)];
    momentText = `\n你曾在「${randomMoment}」中停留，`;
  }
  let poem = `${momentText}你的音乐世界像一场${neoDesc}，\n能量如${energyDesc}，\n情感是${exprDesc}，\n编曲似${densityDesc}。\n这样的你，适合在${code}的旋律里，听见自己的回响。`;
  return poem;
}

function applyDynamicBackground(team) {
  const body = document.body;
  let bgColor = "#aaff99";
  switch(team) {
    case "NCT 127": bgColor = "#88cc77"; break;
    case "NCT DREAM": bgColor = "#bbffaa"; break;
    case "WayV": bgColor = "#77aa66"; break;
    case "NCT U": bgColor = "#99dd88"; break;
    case "NCT WISH": bgColor = "#ccffbb"; break;
    default: bgColor = "#aaff99";
  }
  body.style.backgroundColor = bgColor;
}

function checkEasterEggs(selectedSongNames, songTeams) {
  let eggs = [];
  const allSameTeam = songTeams.length > 0 && songTeams.every(t => t === songTeams[0]);
  if (allSameTeam) {
    const teamKey = songTeams[0];
    let teamName = "", teamAlias = "";
    if (teamKey === "127") { teamName = "NCT 127"; teamAlias = "数"; }
    else if (teamKey === "dream") { teamName = "NCT DREAM"; teamAlias = "梦"; }
    else if (teamKey === "wayv") { teamName = "WayV"; teamAlias = "威"; }
    else if (teamKey === "u") { teamName = "NCT U"; teamAlias = "U"; }
    else if (teamKey === "wish") { teamName = "NCT WISH"; teamAlias = "愿"; }
    eggs.push(`💚 你只选择了 ${teamName} 的歌曲，是完全的${teamAlias}珍妮！能感受到你超级爱 ${teamName} 啦~ 💚`);
  }
  if (selectedSongNames.includes("Sticker") && selectedSongNames.includes("Cherry Bomb")) {
    eggs.push(`💚 你同时选择了 Sticker 和 Cherry Bomb，这是只有绝对NEO西珍妮才能触发的隐藏组合！ NEO 精神在你心中燃烧 💚`);
  }
  if (selectedSongNames.includes("第七感 (The 7th Sense)") && selectedSongNames.includes("BOSS") && selectedSongNames.includes("Make A Wish (Birthday Song)")) {
    eggs.push(`💚 你同时选择了第七感、BOSS 和 Make A Wish，这是只有U队真爱才能触发的隐藏组合！U队灵魂与你共振 💚`);
  }
  const allFive = ["127","dream","wayv","u","wish"];
  const hasAll = allFive.every(t => songTeams.includes(t));
  if (hasAll) {
    eggs.push(`💚 你集齐了五个分队的歌曲，是真正的NCT团粉！NCT♾️NCTzen 💚`);
  }
  return eggs;
}

let currentIndex = 0, questionList = [], userAnswers = [], teamScore = { "127":0, "dream":0, "wayv":0, "u":0, "wish":0 }, totalTeamVotes = 0, mainResult = null, totalQuestions = 0, avgCache = null;

function init() {
  questionList = [];
  for (let i = 0; i < mainQuestions.length; i++) {
    questionList.push({ type: "main", data: mainQuestions[i] });
    questionList.push({ type: "similar", data: similarBranches[mainQuestions[i].id] });
  }
  currentIndex = 0;
  userAnswers = [];
  teamScore = { "127":0, "dream":0, "wayv":0, "u":0, "wish":0 };
  totalTeamVotes = 0;
  selectedSongNames = [];
  userRainChoice = null;
  userSelectedMoments = [];
  totalQuestions = questionList.length;
  document.getElementById('nextBtn').style.display = 'block';
  renderQuestion();
}

function renderQuestion() {
  if (currentIndex >= questionList.length) { showResult(); return; }
  const item = questionList[currentIndex];
  const q = item.data;
  let html = `<div class="question-card"><div class="question-text">${q.text}</div><div class="options">`;
  for (let i = 0; i < q.options.length; i++) {
    html += `<div class="option" data-opt-index="${i}">${q.options[i].text}</div>`;
  }
  html += `</div></div>`;
  document.getElementById('questionsArea').innerHTML = html;
  document.querySelectorAll('.option').forEach(el => {
    el.onclick = () => {
      document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');
      vibrate();
    };
  });
  document.getElementById('progressFill').style.width = ((currentIndex / totalQuestions) * 100) + '%';
}

function nextQuestion() {
  vibrate();
  const sel = document.querySelector('.option.selected');
  if (!sel) { alert("请选择一个选项"); return; }
  const idx = parseInt(sel.dataset.optIndex);
  const item = questionList[currentIndex];
  const q = item.data;
  const opt = q.options[idx];
  const answer = {
    questionId: q.id,
    optionText: opt.text,
    neo: opt.neo || 0,
    energy: opt.energy || 0,
    expression: opt.expression || 0,
    density: opt.density || 0
  };
  if (item.type === "main" || item.type === "similar") {
    answer.team = opt.team;
    teamScore[opt.team]++;
    totalTeamVotes++;
    let songName = opt.text.split("–")[0].trim();
    if (!selectedSongNames.includes(songName)) selectedSongNames.push(songName);
    userSelectedMoments.push(songName);
  } else if (item.type === "teamBranch") {
    let songName = opt.text;
    if (!selectedSongNames.includes(songName)) selectedSongNames.push(songName);
    userSelectedMoments.push(songName);
    const branchTeam = (() => {
      for (let t in teamBranch) if (teamBranch[t].id === q.id) return t;
      return null;
    })();
    if (branchTeam) answer.team = branchTeam;
  } else if (item.type === "text" && opt.next) {
    const nextQ = textQuestions[opt.next];
    if (nextQ) questionList.splice(currentIndex + 1, 0, { type: "text", data: nextQ });
    userSelectedMoments.push(opt.text);
  } else if (item.type === "text" && q.id === "rain_main") {
    userRainChoice = ['A','B','C','D'][idx];
    userSelectedMoments.push(opt.text);
  } else if (item.type === "text") {
    userSelectedMoments.push(opt.text);
  }
  userAnswers.push(answer);
  currentIndex++;
  if (currentIndex === 6 && questionList.length === 6) {
    let topTeam = "u", maxCount = -1;
    for (let t in teamScore) if (teamScore[t] > maxCount) { maxCount = teamScore[t]; topTeam = t; }
    const branch = teamBranch[topTeam];
    if (branch) questionList.push({ type: "teamBranch", data: branch });
    const textOrder = ["scene_main", "mood_main", "explore_main", "state_main", "time_main", "narrative_main", "rain_main"];
    for (let id of textOrder) {
      const tq = textQuestions[id];
      if (tq) questionList.push({ type: "text", data: tq });
    }
    totalQuestions = questionList.length;
  }
  if (currentIndex < questionList.length) renderQuestion();
  else {
    document.getElementById('questionsArea').style.display = 'none';
    document.getElementById('nextBtn').style.display = 'none';
    showResult();
  }
}

function showResult() {
  let sumN=0, sumE=0, sumX=0, sumD=0;
  for (let a of userAnswers) { sumN+=a.neo; sumE+=a.energy; sumX+=a.expression; sumD+=a.density; }
  const n = userAnswers.length || 1;
  let avg = { neoFlavor: sumN/n, energy: sumE/n, expression: sumX/n, density: sumD/n };
  avg.neoFlavor = Math.min(10, Math.max(0, avg.neoFlavor + SHIFT.neo));
  avg.energy = Math.min(10, Math.max(0, avg.energy + SHIFT.energy));
  avg.expression = Math.min(10, Math.max(0, avg.expression + SHIFT.expression));
  avg.density = Math.min(10, Math.max(0, avg.density + SHIFT.density));
  avgCache = avg;
  const code = getCodeFromAvg(avg);
  const typeTeam = getTypeTeam(code);
  
  let finalTeam = null;
  let finalTeamKey = null;
  const songChoices = userAnswers.filter(a => a.team && (a.questionId.startsWith("main") || a.questionId.startsWith("sim")));
  const teamCount = { "127":0, "dream":0, "wayv":0, "u":0, "wish":0 };
  for (let a of songChoices) {
    if (a.team) teamCount[a.team]++;
  }
  let maxTeam = null, maxCount = 0;
  for (let t in teamCount) {
    if (teamCount[t] > maxCount) { maxCount = teamCount[t]; maxTeam = t; }
  }
  if (maxCount >= 5) {
    const teamNameMap = {"127":"NCT 127","dream":"NCT DREAM","wayv":"WayV","u":"NCT U","wish":"NCT WISH"};
    finalTeam = teamNameMap[maxTeam];
    finalTeamKey = maxTeam;
  } else {
    let teamProb = null;
    if (totalTeamVotes > 0) {
      teamProb = {};
      for (let t in teamScore) teamProb[t] = teamScore[t] / totalTeamVotes;
    }
    finalTeam = getFinalTeam(typeTeam, teamProb);
    for (let k in teamBranch) {
      if (teamBranch[k].id === finalTeam.replace(" ", "_").toLowerCase() || finalTeam.includes("127") && k==="127" || finalTeam.includes("DREAM") && k==="dream" || finalTeam.includes("WayV") && k==="wayv" || finalTeam.includes("U") && k==="u" || finalTeam.includes("WISH") && k==="wish") {
        finalTeamKey = k;
        break;
      }
    }
  }
  const bestSong = getBestSongInTeam(finalTeamKey, avg, selectedSongNames, userRainChoice);
  const description = typeDescMap[code] || "独特划味";
  const cr = calculateCredibility(userAnswers);
  const neoPct = avg.neoFlavor*10, engPct = avg.energy*10, expPct = avg.expression*10, denPct = avg.density*10;
  const dimBars = `<div class="dim-bar-group">${dimBar(" ", "NEO划味", neoPct)}${dimBar("清爽R", "I强烈", engPct)}${dimBar("感性S", "F力量", expPct)}${dimBar("简约M", "G华丽", denPct)}</div>`;
  const crBar = `<div class="cr-box"><div class="cr-text">结果可信度：${cr}%</div><div class="dim-progress"><div class="dim-fill" style="width:${cr}%; background:#3c8a29"></div></div><div class="cr-note">以上由西珍妮作答过程计算得</div></div>`;
  
  const poem = generatePoem(avg, userSelectedMoments.slice(0, 12), code);
  const songTeams = userAnswers.filter(a => a.team && (a.questionId.startsWith("main") || a.questionId.startsWith("sim"))).map(a => a.team);
  const easterEggs = checkEasterEggs(selectedSongNames, songTeams);
  let easterHtml = "";
  if (easterEggs.length) {
    easterHtml = `<div class="easter-egg">${easterEggs.join('<br>')}</div>`;
  }
  
  document.getElementById('resultArea').innerHTML = `
    <div class="result-area" id="cardArea">
      <h2>你的划曲风格结果</h2>
      <div class="result-code">${code}</div>
      <p class="result-desc"><strong>${finalTeam}</strong> · ${bestSong.name}</p>
      <p class="result-desc">${description}</p>
      ${easterHtml}
      <div class="poem">${poem}</div>
      <hr>${dimBars}${crBar}
      <p style="margin-top:12px; font-size:1rem; color:#3c8a29; font-weight:bold;">可以尝试听听风格差异大的划曲～</p>
    </div>
    <div class="btn-group">
      <button onclick="shareCard()">分享卡片</button>
      <button onclick="shareTest()">分享测试</button>
      <button onclick="showOppositeResult()">反差最大风格</button>
      <button onclick="restartTest()">重新测试</button>
    </div>`;
  document.getElementById('resultArea').style.display = 'block';
  applyDynamicBackground(finalTeam);
  mainResult = { code, finalTeam, bestSong, description };
}

function shareCard() {
  const element = document.getElementById('cardArea');
  html2canvas(element, { scale: 2, backgroundColor: '#ffffff' }).then(canvas => {
    const link = document.createElement('a');
    link.download = 'NCT_style_result.png';
    link.href = canvas.toDataURL();
    link.click();
  }).catch(err => {
    alert("生成失败，可尝试截图保存");
  });
}

function showOppositeResult() {
  if (!avgCache) return;
  const code = getCodeFromAvg(avgCache);
  let opp = '';
  for (let c of code) {
    if (c === 'N') opp += 'n';
    else if (c === 'n') opp += 'N';
    else if (c === 'I') opp += 'R';
    else if (c === 'R') opp += 'I';
    else if (c === 'F') opp += 'S';
    else if (c === 'S') opp += 'F';
    else if (c === 'G') opp += 'M';
    else if (c === 'M') opp += 'G';
    else opp += c;
  }
  const farthestSong = getFarthestSong(avgCache);
  const farTeam = (() => {
    if (farthestSong.team === "127") return "NCT 127";
    if (farthestSong.team === "dream") return "NCT DREAM";
    if (farthestSong.team === "wayv") return "WayV";
    if (farthestSong.team === "u") return "NCT U";
    if (farthestSong.team === "wish") return "NCT WISH";
    return "NCT U";
  })();
  const oppDesc = typeDescMap[opp] || "另一种划味";
  document.getElementById('resultArea').innerHTML = `
    <div class="result-area">
      <h2>反差最大的划曲风格</h2>
      <div class="result-code">${opp}</div>
      <p class="result-desc"><strong>${farTeam}</strong> · ${farthestSong.name}</p>
      <p class="result-desc">${oppDesc}</p>
    </div>
    <div class="btn-group"><button onclick="location.reload()">查看原结果</button><button onclick="restartTest()">重新测试</button></div>`;
}

window.onload = function() {
  const app = document.getElementById('app');
  const btn = document.createElement('button');
  btn.id = 'nextBtn';
  btn.textContent = '下一题';
  btn.onclick = nextQuestion;
  app.appendChild(btn);
};
</script>
